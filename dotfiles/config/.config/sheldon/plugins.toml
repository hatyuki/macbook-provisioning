# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

[templates]
defer     = "{{ hooks | get: \"pre\" | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks | get: \"post\" | nl }}"
dircolors = "{% for file in files %}eval $(dircolors -b \"{{ file }}\") && zstyle \":completion:*\" list-colors ${(s.:.)LS_COLORS}\n{% endfor %}"
fpath     = 'fpath+=("{{ dir }}")'

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[plugins.anyframe]
github = "mollifier/anyframe"

[plugins.aws-vault]
github = "naitoNanaco/aws-vault-completion"
apply  = ["fpath", "defer"]

[plugins.nix-zsh-completions]
github = "nix-community/nix-zsh-completions"
use = ["nix-zsh-completions.plugin.zsh"]
apply = ["fpath"]

[plugins.nord-dircolors]
github = "arcticicestudio/nord-dircolors"
dir    = "src"
use    = ["dir_colors"]
apply  = ["dircolors"]

[plugins.pure]
github = "sindresorhus/pure"
use    = ["async.zsh", "pure.zsh"]

[plugins.zsh-bd]
github = "Tarrasch/zsh-bd"
apply  = ["defer"]

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply  = ["defer"]

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"
apply = ["defer"]

[plugins.dotfiles-sync]
local = "~/.zsh/plugins"
use   = ["*.sync.zsh"]

[plugins.dotfiles-defer]
local = "~/.zsh/plugins"
use   = ["*.defer.zsh"]
apply  = ["defer"]
